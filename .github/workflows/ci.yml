name: Backend CI

on:
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Test and build
        run: ./gradlew clean test bootJar --no-daemon
